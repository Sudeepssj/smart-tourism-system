{% extends "adminpanel/base.html" %}

{% block content %}

<div class="container mt-4">

<h3>➕ Add Main Category</h3>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">Category Name</label>

<input type="text"
name="name"
class="form-control"
placeholder="Enter category name"
required>

</div>

<button class="btn btn-primary">
Save Category
</button>

<a href="{% url 'admin_main_categories' %}" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

{% endblock %}
