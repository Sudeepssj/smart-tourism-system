{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Provider Panel - Smart Tourism</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Provider Custom CSS -->
    <link rel="stylesheet" href="{% static 'providers/css/provider.css' %}" />
  </head>
  <body>
    <div class="provider-wrapper">
      <!-- Sidebar -->
      <aside class="provider-sidebar collapsed">
        <div class="sidebar-header">
          <h4>Smart Tourism</h4>
          <small>Provider Panel</small>
        </div>

        <ul class="sidebar-menu">
          <li>
            <a href="{% url 'provider_dashboard' %}">
              <i class="fas fa-chart-line"></i>
              <span>Dashboard</span>
            </a>
          </li>

          <!-- <li>
            <a href="#">
              <i class="fas fa-building"></i>
              <span>My Business</span>
            </a>
          </li> -->
          <li>
            <a href="{% url 'provider_my_business' %}">
              <i class="fas fa-building"></i>  
              <span>My Business</span>
            </a>
          </li>

          <!-- <li>
            <a href="#">
              <i class="fas fa-briefcase"></i>
              <span>Services</span>
            </a>
          </li> -->
          <li>
          <a href="{% url 'service_list' %}" class="sidebar-link">
              <i class="fa fa-box"></i> 
              <span>Services</span>
          </a>
          </li>

          <li>
            <a href="#">
              <i class="fas fa-images"></i>
              <span>Gallery</span>
            </a>
          </li>

          <li>
            <a href="{% url 'provider_reviews' %}">
              <i class="fas fa-star"></i>
              <span>Reviews</span>
            </a>
          </li>

          <li>
            <a href="{% url 'provider_bookings' %}">
              <i class="fas fa-calendar-check"></i>
              <span>Bookings</span>
            </a>
          </li>

          <li>
            <a href="#">
              <i class="fas fa-cog"></i>
              <span>Settings</span>
            </a>
          </li>

          <li class="mt-4">
            <a href="{% url 'logout' %}">
              <i class="fas fa-sign-out-alt"></i>
              <span>Logout</span>
            </a>
          </li>
        </ul>
      </aside>

      <!-- Main Content -->
      <div class="provider-main">
        <!-- Topbar -->
        <div class="provider-topbar">
          <button id="sidebarToggle" class="toggle-btn">
            <i class="fas fa-bars"></i>
          </button>

          <div class="provider-info">
            <span class="badge bg-primary">
              {{ request.user.providerprofile.subcategory.name }}
            </span>
            <strong class="ms-3"> {{ request.user.username }} </strong>
          </div>
        </div>

        <!-- Page Content -->
        <div class="provider-content">{% block content %}{% endblock %}</div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Provider JS -->
    <script src="{% static 'providers/js/provider.js' %}"></script>
  </body>
</html>
