{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Account Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height:100vh;">

<div class="card shadow p-4 text-center" style="max-width:400px;">

    {% if status == "pending" %}
        <h4 class="text-warning">⏳ Under Review</h4>
        <p>Your account is waiting for admin approval.</p>
        <p>Please check back later.</p>

    {% elif status == "rejected" %}
        <h4 class="text-danger">❌ Request Rejected</h4>
        <p>Admin rejected your request.</p>
        <p>Please contact support.</p>

    {% endif %}

    <a href="{% url 'logout' %}" class="btn btn-outline-dark mt-3">Logout</a>

</div>

</body>
</html>
