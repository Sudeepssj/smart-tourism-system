{% extends "users/base.html" %}

{% block content %}

<div class="container mt-4">

<h3 class="mb-4">Book {{ service.title }}</h3>

<form method="POST">
{% csrf_token %}

<!-- 🔥 DYNAMIC BOOKING FIELDS -->

{% if booking_type == "stay" %}

<div class="row">
    <div class="col-md-6">
        <label>Check In</label>
        <input type="date" name="check_in"
               class="form-control mb-2"
               min="{{ today|date:'Y-m-d' }}" required>
    </div>

    <div class="col-md-6">
        <label>Check Out</label>
        <input type="date" name="check_out"
               class="form-control mb-2"
               min="{{ today|date:'Y-m-d' }}" required>
    </div>
</div>

{% elif booking_type == "timeslot" %}

<div class="row">
    <div class="col-md-6">
        <label>Date</label>
        <input type="date" name="date"
               class="form-control mb-2"
               min="{{ today|date:'Y-m-d' }}" required>
    </div>

    <div class="col-md-6">
        <label>Time</label>
        <input type="time" name="time"
               class="form-control mb-2" required>
    </div>
</div>

{% elif booking_type == "ride" %}

<div class="row">
    <div class="col-md-6">
        <label>Pickup Date</label>
        <input type="date" name="pickup_date"
               class="form-control mb-2"
               min="{{ today|date:'Y-m-d' }}" required>
    </div>

    <div class="col-md-6">
        <label>Pickup Time</label>
        <input type="time" name="pickup_time"
               class="form-control mb-2">
    </div>
</div>

<label>Pickup Location</label>
<input type="text" name="pickup_location" class="form-control mb-2">

<label>Drop Location</label>
<input type="text" name="drop_location" class="form-control mb-2">

{% else %}

<label>Date</label>
<input type="date" name="date"
       class="form-control mb-2"
       min="{{ today|date:'Y-m-d' }}" required>

{% endif %}

<!-- 🔹 COMMON FIELDS -->

<label>Quantity</label>
<input type="number" name="quantity"
       class="form-control mb-2"
       min="1" value="1">

<label>Phone</label>
<input type="text" name="phone"
       class="form-control mb-2" required>

<label>Special Request</label>
<textarea name="special_request"
          class="form-control mb-3"></textarea>

<button class="btn btn-primary w-100">
    Confirm Booking
</button>

</form>

</div>

{% endblock %}
